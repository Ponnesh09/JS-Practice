<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body>
   
        <div class="container">
            
            <h1>BMI (Body Mass Index) Calculator</h1>
            <form>
                <p> <label for="height">Hight in CM -</label>
                <input type="height" id="height"></p>

            <p> <label for="weight">Weight in KG -</label>
            <input type="weight"  id="weight"></p>

                <button>Calculate</button>
                <div id="result"></div>
                <div id="message">
                    <p>Under weight less than = 18.6</p>
                    <p>Normal Range between 18.6 and 24.9</p>
                    <p>Overweight grater then = 24.9</p>
                </div>
            </form>
        </div>
    <script src="bmiCalculator.js"></script>
</body>
</html>
